name: Auto Cleanup Repo History

on:
  schedule:
    - cron: '0 0 * * 1' # 每週一執行一次 (UTC 時間)
  workflow_dispatch: # 允許你手動點擊按鈕立即執行

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 獲取所有歷史

      - name: Reset Git History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 建立一個孤立分支
          git checkout --orphan temp_branch
          
          # 加入當前所有圖片和文件
          git add -A
          
          # 提交
          git commit -m "定期自動清理歷史記錄，釋放空間 [$(date)]"
          
          # 強制覆蓋主分支 (假設你的主分支叫 main)
          git branch -D main
          git branch -m main
          
          # 使用 Actions 內建的 TOKEN 推送
          git push origin main --force
